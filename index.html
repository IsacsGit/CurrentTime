<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Klocka</title>
    <style>
        /* Ladda in den lokala fonten från samma mapp */
        @font-face {
            font-family: 'SFProLight';
            src: url('SFProLight.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Använd den inlästa fonten. Om den inte laddas faller den tillbaka på sans-serif */
            font-family: 'SFProLight', sans-serif;
            overflow: hidden;
        }

        #clock-container {
            display: flex;
            align-items: baseline;
        }

        #time {
            font-size: 24vw;
            letter-spacing: -2px;
            /* font-weight är borttaget här eftersom filen i sig redan är "Light" */
        }

        #seconds {
            font-size: 8vw; /* Exakt 1/3 av 24vw */
            margin-left: 1vw;
            color: #cccccc;
        }
    </style>
</head>
<body>

    <div id="clock-container">
        <div id="time"></div>
        <div id="seconds"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            document.getElementById('time').textContent = hours + ':' + minutes;
            document.getElementById('seconds').textContent = ':' + seconds;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
